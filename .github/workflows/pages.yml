name: Deploy Pages

# Deploys the contents of docs/ to GitHub Pages whenever the folder
# changes. After enabling Pages once (Settings → Pages → Source = "GitHub
# Actions") this runs fully automatically — no branch protection or extra
# config required.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Single in-flight deploy at a time; never cancel a deploy mid-run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages on the repo if it isn't already; saves a manual
          # trip to Settings → Pages.
          enablement: true

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
