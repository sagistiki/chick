<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  Reference document for generating a new chick spritesheet.
  Hand this SVG (or a screenshot of it) to an AI image generator together
  with the prompt in the project README, so the output matches the exact
  64×32 px / 4-frame layout the engine expects.

  The image you generate to replace `Free Chicken Sprites.png` must be:
    - exactly 64 × 32 pixels (no padding, no extra margins)
    - 4 horizontal frames of 16 × 16 each
    - transparent background outside the chick body
    - all 4 frames facing RIGHT (engine flips for left motion)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" width="960" height="720">
  <defs>
    <!-- Pink checker = transparent / alpha-zero region indicator -->
    <pattern id="checker" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#F8F0F4"/>
      <rect width="8"  height="8"  fill="#EBD8E2"/>
      <rect x="8" y="8" width="8" height="8" fill="#EBD8E2"/>
    </pattern>
    <!-- 1-source-pixel grid drawn at the ×8 zoom of the sprite area -->
    <pattern id="pixelgrid" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <path d="M 8 0 L 0 0 L 0 8" fill="none" stroke="#C9B5C2"
            stroke-width="0.4" opacity="0.7"/>
    </pattern>
  </defs>

  <rect width="960" height="720" fill="#FFFFFF"/>

  <!-- ========== TITLE ========== -->
  <text x="480" y="46" font-family="-apple-system, system-ui, sans-serif"
        font-size="30" font-weight="700" text-anchor="middle" fill="#1F1F1F">
    Cute Chick — Pixel-Art Spritesheet
  </text>
  <text x="480" y="74" font-family="-apple-system, system-ui, sans-serif"
        font-size="14" text-anchor="middle" fill="#5C5C5C">
    Source: 64 × 32 px · 4 horizontal frames of 16 × 16 · walk cycle · transparent background
  </text>

  <!-- ========== ZOOMED SPRITE CANVAS (×8 scale → 512 × 256) ========== -->
  <g transform="translate(224, 110)">
    <rect width="512" height="256" fill="url(#checker)"/>
    <rect width="512" height="256" fill="url(#pixelgrid)"/>

    <!-- Frame separators (every 128 disp = 16 src) -->
    <g fill="none" stroke="#FF6BB5" stroke-width="3.5" stroke-dasharray="6,4">
      <rect x="0"   y="0" width="128" height="256"/>
      <rect x="128" y="0" width="128" height="256"/>
      <rect x="256" y="0" width="128" height="256"/>
      <rect x="384" y="0" width="128" height="256"/>
    </g>

    <!-- Faint chick silhouettes — size/position hint, not a literal design -->
    <g opacity="0.22" fill="#FFD93D" stroke="#C49000" stroke-width="2.5">
      <ellipse cx="64"  cy="156" rx="44" ry="48"/>
      <ellipse cx="192" cy="152" rx="44" ry="48"/>
      <ellipse cx="320" cy="156" rx="44" ry="48"/>
      <ellipse cx="448" cy="152" rx="44" ry="48"/>
    </g>

    <!-- Pixel-coordinate ticks (source-px values) -->
    <g font-family="monospace" font-size="11" fill="#888">
      <text x="0"   y="-6">0</text>
      <text x="128" y="-6">16</text>
      <text x="256" y="-6">32</text>
      <text x="384" y="-6">48</text>
      <text x="512" y="-6" text-anchor="end">64</text>
      <text x="-6"  y="4"   text-anchor="end">0</text>
      <text x="-6"  y="132" text-anchor="end">16</text>
      <text x="-6"  y="260" text-anchor="end">32</text>
    </g>
  </g>

  <!-- ========== FRAME LABELS + POSE HINTS ========== -->
  <g font-family="-apple-system, system-ui, sans-serif" text-anchor="middle">
    <g font-size="16" font-weight="700" fill="#3A3A3A">
      <text x="288" y="395">Frame 0</text>
      <text x="416" y="395">Frame 1</text>
      <text x="544" y="395">Frame 2</text>
      <text x="672" y="395">Frame 3</text>
    </g>
    <g font-size="12" fill="#6E6E6E">
      <text x="288" y="416">standing</text>
      <text x="288" y="431">(both feet planted)</text>

      <text x="416" y="416">walk →</text>
      <text x="416" y="431">(left foot lifted)</text>

      <text x="544" y="416">standing</text>
      <text x="544" y="431">(slight bob 1 px)</text>

      <text x="672" y="416">walk →</text>
      <text x="672" y="431">(right foot lifted)</text>
    </g>
  </g>

  <!-- ========== COLOUR PALETTE ========== -->
  <g transform="translate(80, 470)">
    <text font-family="-apple-system, system-ui, sans-serif" font-size="18"
          font-weight="700" fill="#1F1F1F">Suggested palette (use these exactly — no gradients)</text>

    <g font-family="monospace" font-size="11" text-anchor="middle">
      <g transform="translate(0, 30)">
        <rect width="60" height="60" fill="#FFE57A" stroke="#888" stroke-width="0.5"/>
        <text x="30" y="78">#FFE57A</text>
        <text x="30" y="93" font-family="-apple-system, sans-serif">body lt</text>
      </g>
      <g transform="translate(75, 30)">
        <rect width="60" height="60" fill="#FFD93D" stroke="#888" stroke-width="0.5"/>
        <text x="30" y="78">#FFD93D</text>
        <text x="30" y="93" font-family="-apple-system, sans-serif">body</text>
      </g>
      <g transform="translate(150, 30)">
        <rect width="60" height="60" fill="#E8B600" stroke="#888" stroke-width="0.5"/>
        <text x="30" y="78">#E8B600</text>
        <text x="30" y="93" font-family="-apple-system, sans-serif">body shadow</text>
      </g>
      <g transform="translate(225, 30)">
        <rect width="60" height="60" fill="#FF8C00" stroke="#888" stroke-width="0.5"/>
        <text x="30" y="78">#FF8C00</text>
        <text x="30" y="93" font-family="-apple-system, sans-serif">beak / feet</text>
      </g>
      <g transform="translate(300, 30)">
        <rect width="60" height="60" fill="#C66200" stroke="#888" stroke-width="0.5"/>
        <text x="30" y="78">#C66200</text>
        <text x="30" y="93" font-family="-apple-system, sans-serif">beak shadow</text>
      </g>
      <g transform="translate(375, 30)">
        <rect width="60" height="60" fill="#1A1A1A" stroke="#888" stroke-width="0.5"/>
        <text x="30" y="78" fill="#1A1A1A">#1A1A1A</text>
        <text x="30" y="93" font-family="-apple-system, sans-serif" fill="#1A1A1A">eye</text>
      </g>
      <g transform="translate(450, 30)">
        <rect width="60" height="60" fill="#FFA0BA" stroke="#888" stroke-width="0.5"/>
        <text x="30" y="78">#FFA0BA</text>
        <text x="30" y="93" font-family="-apple-system, sans-serif">cheek (opt.)</text>
      </g>
      <g transform="translate(525, 30)">
        <rect width="60" height="60" fill="#FFFFFF" stroke="#888" stroke-width="0.5"/>
        <text x="30" y="78">#FFFFFF</text>
        <text x="30" y="93" font-family="-apple-system, sans-serif">eye glint (opt.)</text>
      </g>
    </g>
  </g>

  <!-- ========== NOTES ========== -->
  <g transform="translate(80, 615)" font-family="-apple-system, system-ui, sans-serif">
    <text font-size="16" font-weight="700" fill="#1F1F1F">Hard rules</text>
    <g font-size="13" fill="#444">
      <text y="22">•  Output must be exactly 64 × 32 px — no margin, no signature, no padding around the spritesheet.</text>
      <text y="42">•  All four frames face RIGHT. The engine mirrors them horizontally for left-bound motion.</text>
      <text y="62">•  No anti-aliasing — every coloured region must be a solid block of identical pixels.</text>
      <text y="82">•  Background is fully transparent (alpha 0). The pink checker above shows where alpha must be 0.</text>
      <text y="102">•  Chick body fits inside roughly 12 × 14 px of each 16 × 16 frame, leaving ~1–2 px padding.</text>
    </g>
  </g>
</svg>
